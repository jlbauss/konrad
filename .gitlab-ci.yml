# =============================================================================
# GitLab CI — daily lock-file refresh.
#
# Why this exists, and why on GitLab (not GitHub Actions like the build):
#
# The container image build itself lives on GitHub Actions
# (.github/workflows/build-image.yml). That move was forced by
# gitlab.git.nrw's shared docker runners not granting the user-namespace
# / clone() capabilities Podman-in-Docker needs (see commit f5bc95d).
#
# This job is different: it just resolves dependency names (uv pip
# compile, npm view, GitHub releases API) and pushes the bump directly
# to main. No Podman, no privileged container ops — runs fine on the
# same shared runner that couldn't host the image build.
#
# Why this matters: the GitLab repo is source of truth; GitHub is a
# one-way push mirror. A bot that lands commits on GitHub directly
# (where the resolve-locks workflow used to live) creates commits the
# mirror can't reconcile back to GitLab. Moving the bot to GitLab keeps
# the source of truth single, and the push to main mirrors to GitHub,
# which then triggers build-image.yml via the image/** path filter.
#
# Why direct push (no MR): this bot has no reviewer and no MR pipeline
# gates the merge (image build + smoke run downstream on the GitHub
# mirror after main moves). The konrad working agreement (CLAUDE.md)
# already prescribes CLI merges over MRs for trunk-based flow; for a
# deterministic daily bump the MR adds polling complexity without
# review value, and FF-pushing main keeps history linear.
#
# Setup (manual, one-time, done in the GitLab UI):
#   1. Settings → Access Tokens → create a Project Access Token with
#      scope `write_repository`. Role must be allowed to push to main:
#      Maintainer if main is a protected branch, Developer otherwise.
#      Stash as a masked + protected CI/CD variable named BOT_PAT.
#   1b. (Optional but recommended) Settings → CI/CD → Variables → add a
#      masked variable HF_TOKEN holding a HuggingFace read token. The models
#      resolver uses it to lift the anonymous HF API rate limit; without it
#      the resolver still works but can hit 429s on busy days. The image
#      build (GitHub Actions) can take the same token to lift the limit on
#      the model *download* — the unauthenticated limit failed a build once.
#   2. Settings → CI/CD → Pipeline schedules → New schedule:
#        cron:        0 1 * * *   (daily 01:00 UTC)
#        target:      main
#        description: daily lock refresh
#      The job is gated to schedule + manual web triggers (see `rules:`
#      below), so it never runs on regular pushes.
# =============================================================================

resolve-locks:
  image: node:26-trixie-slim
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "1"
  script:
    - |
      set -eux

      # ---- bootstrap toolchain --------------------------------------------
      apt-get update
      apt-get install -y --no-install-recommends \
        git curl jq ca-certificates xz-utils
      rm -rf /var/lib/apt/lists/*
      curl -fsSL https://astral.sh/uv/install.sh \
        | env UV_INSTALL_DIR=/usr/local/bin sh

      # ---- helper: resolve current manifest digest of an image ref --------
      # Speaks Docker Registry HTTP API v2 against either Docker Hub or
      # GHCR. The Accept header asks for an index (multi-arch) manifest
      # first, falling back to single-platform manifests — so for a tag
      # that points at an index we get the index digest, which is what
      # `FROM image@<digest>` resolves correctly across architectures.
      # Output: "sha256:..." on stdout; exits non-zero on failure.
      resolve_digest() {
        ref="$1"                       # e.g., node:26-trixie-slim
        # Bash parameter expansion gotcha: when $ref has no ':', both
        # ${ref%:*} and ${ref##*:} return the whole string unchanged
        # (the pattern matches nothing). That would silently produce
        # garbage URLs like .../manifests/ghcr.io/astral-sh/uv → 405.
        # Require an explicit tag in the lock and refuse to guess.
        case "$ref" in
          *:*) : ;;
          *) echo "ref '$ref' has no ':<tag>' — write the tag explicitly in the lock" >&2; return 1 ;;
        esac
        name="${ref%:*}"
        tag="${ref##*:}"
        case "$name" in
          ghcr.io/*)
            registry="ghcr.io"; path="${name#ghcr.io/}"
            auth_host="ghcr.io"; auth_service="ghcr.io"
            ;;
          *)
            registry="registry-1.docker.io"; path="$name"
            case "$path" in */*) ;; *) path="library/$path" ;; esac
            auth_host="auth.docker.io"; auth_service="registry.docker.io"
            ;;
        esac
        token="$(curl -fsSL \
          "https://${auth_host}/token?service=${auth_service}&scope=repository:${path}:pull" \
          | jq -r .token)"
        [ -n "$token" ] && [ "$token" != "null" ] \
          || { echo "auth token fetch failed for $ref" >&2; return 1; }
        digest="$(curl -fsSI \
          -H "Authorization: Bearer $token" \
          -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
          "https://${registry}/v2/${path}/manifests/${tag}" \
          | awk 'tolower($1) == "docker-content-digest:" { gsub(/[\r\n]/,"",$2); print $2 }')"
        [ -n "$digest" ] \
          || { echo "no Docker-Content-Digest in manifest response for $ref" >&2; return 1; }
        printf '%s' "$digest"
      }

      # ---- helper: resolve a HF model repo's main HEAD commit sha ----------
      # HF_TOKEN (masked CI var, optional) lifts the anonymous rate limit —
      # the unauthenticated limit is what failed a build once. Output: the
      # commit sha on stdout.
      hf_main_sha() {
        repo="$1"
        if [ -n "${HF_TOKEN:-}" ]; then
          curl -fsSL -H "Authorization: Bearer $HF_TOKEN" "https://huggingface.co/api/models/${repo}"
        else
          curl -fsSL "https://huggingface.co/api/models/${repo}"
        fi | jq -r '.sha'
      }

      # ---- re-resolve each lock -------------------------------------------
      cd image/locks
      MOVED=""

      # base image: lock holds "<name>:<tag>@sha256:..." — re-resolve digest
      # for the same name:tag and bump if it moved. Major-bumping the tag
      # (e.g., node:26 → node:27) is a deliberate manual edit to base.lock;
      # the bot resolves the new digest on its next run.
      OLD_BASE="$(cat base.lock)"
      BASE_REF="${OLD_BASE%@*}"
      NEW_BASE="${BASE_REF}@$(resolve_digest "$BASE_REF")"
      if [ "$OLD_BASE" != "$NEW_BASE" ]; then
        echo "$NEW_BASE" > base.lock
        MOVED="$MOVED base"
      fi

      # uv source image — same pattern.
      OLD_UV="$(cat uv.lock)"
      UV_REF="${OLD_UV%@*}"
      NEW_UV="${UV_REF}@$(resolve_digest "$UV_REF")"
      if [ "$OLD_UV" != "$NEW_UV" ]; then
        echo "$NEW_UV" > uv.lock
        MOVED="$MOVED uv"
      fi

      # --no-annotate + --no-header strip the `# via …` lines and the
      # autogenerated header. They're informational, but every reshuffle
      # of the dep graph (or change to the uv invocation) produced
      # spurious diffs even when no version actually moved — they were
      # the biggest source of "the lock changed but didn't really change"
      # noise. Re-generate annotated locally with the same command minus
      # these two flags when you need to trace where a dep came from.
      uv pip compile python.spec \
        --torch-backend=cpu \
        --python-version=3.13 \
        --no-annotate \
        --no-header \
        -o python.lock.new
      if diff -q python.lock python.lock.new >/dev/null 2>&1; then
        rm python.lock.new
      else
        mv python.lock.new python.lock
        MOVED="$MOVED python"
      fi

      # npm itself comes from the base image (already pinned by base.lock);
      # we only resolve opencode-ai here.
      OPENCODE_VERSION="$(npm view opencode-ai version)"
      jq -n --arg opencode "$OPENCODE_VERSION" \
        '{"opencode-ai": $opencode}' > npm.lock.new
      if diff -q npm.lock npm.lock.new >/dev/null 2>&1; then
        rm npm.lock.new
      else
        mv npm.lock.new npm.lock
        MOVED="$MOVED npm"
      fi

      TYPST_VERSION="$(curl -fsSL https://api.github.com/repos/typst/typst/releases/latest \
                         | jq -r .tag_name | sed 's/^v//')"
      [ -n "$TYPST_VERSION" ] && [ "$TYPST_VERSION" != "null" ] \
        || { echo "could not resolve latest Typst version" >&2; exit 1; }
      echo "$TYPST_VERSION" > typst.lock.new
      if diff -q typst.lock typst.lock.new >/dev/null 2>&1; then
        rm typst.lock.new
      else
        mv typst.lock.new typst.lock
        MOVED="$MOVED typst"
      fi

      # models: models.lock holds "<hf_repo_id> <sha>" lines (plus # comments)
      # for the docling model repos we track at upstream main. Re-resolve each
      # repo's main HEAD and rewrite the lock, preserving comments and order.
      # Tableformer + rapidocr are intentionally absent — docling pins those,
      # not us, so the bot must not touch them. A repo that resolves to nothing
      # is a hard error (deleted/renamed upstream → a maintainer must act).
      : > models.lock.new
      while IFS= read -r line || [ -n "$line" ]; do
        case "$line" in
          ''|\#*) printf '%s\n' "$line" >> models.lock.new; continue ;;
        esac
        repo="${line%% *}"
        new_sha="$(hf_main_sha "$repo")"
        [ -n "$new_sha" ] && [ "$new_sha" != "null" ] \
          || { echo "could not resolve main sha for model repo $repo" >&2; exit 1; }
        printf '%s %s\n' "$repo" "$new_sha" >> models.lock.new
      done < models.lock
      if diff -q models.lock models.lock.new >/dev/null 2>&1; then
        rm models.lock.new
      else
        mv models.lock.new models.lock
        MOVED="$MOVED models"
      fi

      cd ../..

      # provider-hosts map: regenerate from models.dev (the built-in-provider
      # endpoints the egress proxy allow-lists). Same "pin upstream data, bake
      # the pinned copy" pattern as the locks above — see the script header.
      cp image/konrad-defaults/provider-hosts.json /tmp/provider-hosts.old
      ./scripts/resolve-provider-hosts.sh
      diff -q /tmp/provider-hosts.old image/konrad-defaults/provider-hosts.json >/dev/null 2>&1 \
        || MOVED="$MOVED provider-hosts"

      MOVED="$(echo "$MOVED" | xargs)"
      if [ -z "$MOVED" ]; then
        echo "Nothing moved — daily noop, exiting clean."
        exit 0
      fi
      echo "Locks moved: $MOVED"

      # ---- commit + push directly to main ---------------------------------
      # FF-push HEAD to main. If main moved after this pipeline started
      # the push is rejected (no -f), which is the desired behavior:
      # tomorrow's run will re-resolve against the new main.
      git config user.email "konrad-bot@gitlab.git.nrw"
      git config user.name  "konrad-locks-bot"
      git add image/locks image/konrad-defaults/provider-hosts.json
      git commit -m "chore(locks): bump $MOVED"
      git push \
        "https://oauth2:${BOT_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        HEAD:main

# =============================================================================
# REUSE compliance gate.
#
# Unlike the image build (privileged Podman → forced onto GitHub Actions),
# `reuse lint` is a plain file check that runs fine on gitlab.git.nrw's shared
# runner — and it belongs here, on the source-of-truth repo where MRs and
# merges land, so it gates before/at merge rather than post-mirror. The
# AGPL-3.0-or-later catch-all in REUSE.toml auto-covers new first-party files,
# so a green pipeline is the steady state and this rarely needs attention.
# =============================================================================
reuse:
  image:
    name: fsfe/reuse:latest
    entrypoint: [""]
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - reuse lint

# =============================================================================
# Markdown lint gate.
#
# Like `reuse` above: a plain file check on the shared runner, gating at MR/push
# so the human-facing docs stay consistently formatted. Rules live in
# .markdownlint.jsonc (shared, symlinked by config-layer repos); scope/ignores in
# .markdownlint-cli2.jsonc — both auto-discovered. Baked image/** docs are out of
# scope on purpose (they ride image rebuilds, not a docs linter). Run it locally
# with `npx --yes markdownlint-cli2` before pushing; CI is the backstop.
# =============================================================================
markdownlint:
  image: node:26-trixie-slim
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - npx --yes markdownlint-cli2

# =============================================================================
# Tagged GitLab Releases — "tag what I bumped."
#
# Releases live on GitLab (the GitHub mirror is CI-only). This job closes
# the "we don't tag today" gap without touching how releases are authored:
# the maintainer still hand-bumps VERSION (chore(release): …) and hand-curates
# CHANGELOG.md. When that bump lands on main, this job creates the git tag
# `v<VERSION>` at the merge commit and a GitLab Release whose notes are the
# matching CHANGELOG section — no semantic-release, no generated changelog,
# no version computation. CHANGELOG.md stays the source of truth.
#
# Why GitLab CI (not the GitHub build workflow): tags + releases belong on
# the source-of-truth forge, and this is a plain API call on the shared
# runner — no privileged Podman, same as resolve-locks/reuse.
#
# Trigger: a push to main that changes VERSION. A FF-merge of a feature
# branch carries the chore(release) commit, so `changes: [VERSION]` fires
# exactly once per release and never on doc/CI/roadmap-only pushes.
#
# Auth: release-cli uses CI_JOB_TOKEN by default, which can create releases
# in this project. If `v*` is a *protected* tag and the job token can't
# create it, either grant the token's user the role or pass the existing
# BOT_PAT: add `--private-token "$BOT_PAT"` to the release-cli call.
# =============================================================================
release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags: [docker]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - VERSION
  script:
    - |
      set -eu
      VERSION="$(cat VERSION)"
      TAG="v$VERSION"

      # Extract this version's CHANGELOG section: everything between the
      # `## [<VERSION>]` heading and the next `## [` heading, dropping the
      # leading blank line (started flips on the first non-blank). awk-only —
      # the release-cli image is BusyBox, whose sed rejects GNU brace/label
      # trims. Falls back to a pointer if the section is missing (a bump
      # should always carry one).
      NOTES="$(awk -v ver="$VERSION" '
        $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
        grab && /^## \[/ { exit }
        grab && NF { started = 1 }
        grab && started { print }
      ' CHANGELOG.md)"
      [ -n "$NOTES" ] || NOTES="See [CHANGELOG.md](CHANGELOG.md) for $TAG."

      echo "Releasing $TAG at $CI_COMMIT_SHA"
      release-cli create \
        --name "konrad $TAG" \
        --tag-name "$TAG" \
        --ref "$CI_COMMIT_SHA" \
        --description "$NOTES"

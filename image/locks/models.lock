# Docling model repos tracked at upstream `main`, pinned by commit so the baked
# model layer is byte-stable across rebuilds (users skip re-pulling unchanged
# models). The GitLab resolve-locks bot re-resolves each repo's main HEAD daily
# and bumps when it moves; image/fetch-models.py fetches these at the pinned
# revision. Tableformer (docling tag-pins it to v2.3.0) and rapidocr (a fixed
# per-backend/language file set tied to the locked docling-slim version) are
# deliberately NOT here — they ride docling's own pins, not main.

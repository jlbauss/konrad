# =============================================================================
# Daily lock-file refresh — re-resolves the upstream names that float
# (Python deps, opencode-ai, npm itself, Typst) and opens a PR when any
# of the four lockfiles in image/locks/ has genuinely moved.
#
# Why this exists: the main build-image.yml workflow no longer uses
# `no-cache: true` on scheduled runs (it relies on Docker's layer cache
# to skip layers whose inputs are unchanged). For floating pins to still
# flow in, *something* has to re-resolve them — that's this workflow.
#
# Daily noop case: nothing moves → no PR → no `image/**` change → no
# build → no user pull. That's the whole point of the dedupe.
#
# When something moves: a single PR lands the lock bump; merging it
# triggers build-image.yml via the `image/**` path filter; CI rebuilds
# only the layer whose lock changed plus everything downstream.
#
# Runs inside `node:26-trixie-slim` so the Python resolution happens
# against the same Python interpreter the runtime image will use.
# =============================================================================

name: Resolve and bump locks

on:
  schedule:
    # Daily at 01:00 UTC — runs an hour before build-image.yml's
    # scheduled trigger so any lock bump that lands here has time to
    # trigger the downstream build before the next scheduled rebuild.
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    container:
      image: node:26-trixie-slim
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Install host tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl jq ca-certificates python3 xz-utils
          rm -rf /var/lib/apt/lists/*

      - name: Install uv
        run: |
          curl -fsSL https://astral.sh/uv/install.sh \
            | env UV_INSTALL_DIR=/usr/local/bin sh

      - uses: actions/checkout@v5

      - name: Re-resolve python.lock
        id: python
        run: |
          set -eux
          cd image/locks
          uv pip compile python.spec \
            --torch-backend=cpu \
            --python-version=3.13 \
            -o python.lock.new
          if diff -q python.lock python.lock.new >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            rm python.lock.new
          else
            mv python.lock.new python.lock
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-resolve npm.lock
        id: npm
        run: |
          set -eux
          cd image/locks
          NPM_VERSION="$(npm view npm version)"
          OPENCODE_VERSION="$(npm view opencode-ai version)"
          jq -n --arg npm "$NPM_VERSION" --arg opencode "$OPENCODE_VERSION" \
            '{"opencode-ai": $opencode, "npm": $npm}' > npm.lock.new
          if diff -q npm.lock npm.lock.new >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            rm npm.lock.new
          else
            mv npm.lock.new npm.lock
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-resolve typst.lock
        id: typst
        run: |
          set -eux
          cd image/locks
          TYPST_VERSION="$(curl -fsSL https://api.github.com/repos/typst/typst/releases/latest \
                             | jq -r .tag_name | sed 's/^v//')"
          [ -n "$TYPST_VERSION" ] && [ "$TYPST_VERSION" != "null" ] \
            || { echo "could not resolve latest Typst version" >&2; exit 1; }
          echo "$TYPST_VERSION" > typst.lock.new
          if diff -q typst.lock typst.lock.new >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            rm typst.lock.new
          else
            mv typst.lock.new typst.lock
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize what moved
        id: summary
        if: steps.python.outputs.changed == 'true' || steps.npm.outputs.changed == 'true' || steps.typst.outputs.changed == 'true'
        run: |
          set -eux
          MOVED=""
          [ "${{ steps.python.outputs.changed }}" = "true" ] && MOVED="$MOVED python"
          [ "${{ steps.npm.outputs.changed }}" = "true" ]    && MOVED="$MOVED npm"
          [ "${{ steps.typst.outputs.changed }}" = "true" ]  && MOVED="$MOVED typst"
          MOVED="$(echo "$MOVED" | sed 's/^ //')"
          echo "moved=$MOVED" >> "$GITHUB_OUTPUT"

      - name: Open PR if anything moved
        if: steps.python.outputs.changed == 'true' || steps.npm.outputs.changed == 'true' || steps.typst.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(locks): bump ${{ steps.summary.outputs.moved }}"
          title: "chore(locks): bump ${{ steps.summary.outputs.moved }}"
          body: |
            Daily lock refresh — the following input(s) moved upstream:
            **${{ steps.summary.outputs.moved }}**

            Merging this PR triggers `build-image.yml` via the `image/**`
            path filter; CI will rebuild only the affected layer(s).
          branch: locks/auto-bump
          delete-branch: true
          add-paths: image/locks

# =============================================================================
# konrad CI — build, smoke-test, publish the container image.
#
# This workflow runs on GitHub Actions even though the primary repo lives
# on gitlab.git.nrw. The GitHub repo is a push mirror that exists only as
# a CI execution surface; code work happens on GitLab. See README's
# "Pinning strategy" section for the why.
#
# Trigger model:
#   - push to main when image/, scripts/smoke-test.sh, this file, or
#     VERSION changes  → build + smoke + publish (rolling tags)
#   - pull_request    → build + smoke + publish under :pr-<num>
#   - workflow_dispatch from main → same as push (rolling tags)
#   - workflow_dispatch from any other ref → build + smoke, NO publish
#     (guards the rolling tags from being clobbered by a manual run
#      against a non-main branch — e.g. prep/public-alpha integration
#      branches; you still get a build + smoke signal in the run log.)
#
# Every floating input is now lock-managed (image/locks/{base,uv,python,
# npm,typst,models}.lock). The GitLab resolve-locks bot resolves these
# daily; when any lock moves the merge mirrors to GitHub and triggers
# a real build here via the path filter on image/**. There is no daily
# `schedule:` trigger on this workflow — a build only fires when there
# is something genuinely new to build.
#
# Smoke-gated publish: if either arch's smoke job fails, publish never
# runs and `:latest` stays pointed at the last good build.
#
# Tag scheme (all pushed by every successful pipeline; each tag is a
# multi-arch manifest list spanning linux/amd64 and linux/arm64). VERSION
# pre-1.0 is `0.X.Y` (X = minor, Y = patch); the docs/design/versioning-
# and-releases.md doc has the full rules.
#   :<ver>-<date>      immutable; e.g. 0.2.1-2026-05-29 — the rollback handle.
#                      Hyphen (not dot) so the tag doesn't read as four
#                      version segments.
#   :<ver>             rolling; latest passing build for that exact patch
#                      version (0.X.Y)
#   :<minor>           rolling; latest passing patch on the 0.X line.
#                      Derived from VER as ${VER%.*} (strips the trailing
#                      .Y). Users on `:0.X` get patches automatically and
#                      stop getting updates when X bumps.
#   :latest            rolling alias for the newest passing build overall
#   :<short-sha>       immutable; for bisecting
#
# Architecture: amd64 + arm64. Each arch builds natively on its own
# runner (ubuntu-latest / ubuntu-24.04-arm) in parallel, smokes natively
# on the same arch, then the publish job stitches the two per-arch
# manifests into a multi-arch manifest list per public tag. arm64 is a
# premium runner on private GitHub repos (billable minutes) but the
# locks-driven CI cadence keeps the cost negligible; arm64 runner
# minutes go free once the mirror flips public. Apple Silicon users get
# native arm64 transparently instead of QEMU emulation.
# =============================================================================

name: Build and publish konrad image

on:
  push:
    branches: [main]
    paths:
      - 'image/**'
      - 'scripts/smoke-test.sh'
      - '.github/workflows/build-image.yml'
      - 'VERSION'
  pull_request:
    branches: [main]
    paths:
      - 'image/**'
      - 'scripts/smoke-test.sh'
      - '.github/workflows/build-image.yml'
      - 'VERSION'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository is "owner/repo" — lowercased to satisfy ghcr.io's
  # requirement that image paths be lowercase.
  IMAGE_NAME: ${{ github.repository }}
  # Force JavaScript actions to run on Node 24 instead of the deprecated
  # Node 20 runtime. checkout@v5 and build-push-action@v6 already ship
  # Node 24; setup-buildx-action@v3 and login-action@v3 still ship
  # Node 20 (no v4 yet). This env var silences their deprecation warning
  # and runs them on Node 24 too — GitHub will flip this default in
  # June 2026 anyway. Remove this line once the docker org ships Node 24
  # versions of setup-buildx and login.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Build — matrix over (amd64, arm64). Each cell runs natively on a
  # matching runner and pushes its arch's image to a per-arch transient
  # tag (ci-<run_id>-<arch>). The publish job merges both into a multi-
  # arch manifest list.
  #
  # fail-fast: false → an arm64-only break still lets the amd64 cell
  # finish so we have full diagnostic data, not just "the first failure
  # cancelled the rest."
  #
  # Cache scopes are arch-specific (scope=amd64 / scope=arm64) so the
  # two parallel cells don't clobber each other's GHA cache.
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Compute build metadata
        id: metadata
        run: |
          VER=$(cat VERSION)
          DATE=$(date -u +%Y-%m-%d)
          SHA=${GITHUB_SHA::7}
          # Commit committer date in ISO-8601 UTC → BUILD_DATE in the
          # image's build-manifest.json so two builds from the same source
          # commit produce a byte-identical manifest layer.
          # (SOURCE_DATE_EPOCH is a separate, fixed value — see the build
          # step's build-args. We anchored it to the commit at first; that
          # was a mistake — BuildKit's rewrite-timestamp pass runs over
          # every exported layer including cache hits, so a per-commit
          # SDE produced new layer digests on every commit even when
          # content was byte-identical. Fixed value avoids that.)
          COMMIT_DATE=$(git log -1 --format=%cI "$GITHUB_SHA" | sed 's/+00:00/Z/' | sed 's/T\(..\):\(..\):\(..\).*/T\1:\2:\3Z/')
          # IMAGE_NAME may contain uppercase from $github.repository when
          # the GitHub username/repo has any. ghcr.io rejects uppercase
          # in image paths, so lowercase it here.
          IMG=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          # Per-arch transient tag so the two parallel matrix builds
          # write to distinct tags. Publish merges them later.
          TRANSIENT="$IMG:ci-${{ github.run_id }}-${{ matrix.arch }}"
          # Pinned image refs (full name@digest) from the lock files. Local
          # `konrad-dev --rebuild` reads the same files, so the CI build
          # resolves to identical digests as a developer's local build.
          BASE_IMAGE=$(cat image/locks/base.lock)
          UV_IMAGE=$(cat image/locks/uv.lock)
          [ -n "$BASE_IMAGE" ] || { echo "empty image/locks/base.lock" >&2; exit 1; }
          [ -n "$UV_IMAGE" ]   || { echo "empty image/locks/uv.lock"   >&2; exit 1; }
          {
            echo "version=$VER"
            echo "date=$DATE"
            echo "sha=$SHA"
            echo "commit_date=$COMMIT_DATE"
            echo "image=$IMG"
            echo "transient=$TRANSIENT"
            echo "base_image=$BASE_IMAGE"
            echo "uv_image=$UV_IMAGE"
          } >> "$GITHUB_OUTPUT"
          echo "konrad $VER @ $SHA (build $DATE, commit $COMMIT_DATE)"
          echo "platform: ${{ matrix.platform }} on ${{ matrix.runner }}"
          echo "base: $BASE_IMAGE"
          echo "uv:   $UV_IMAGE"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (transient tag, ${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: image/
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.metadata.outputs.transient }}
          build-args: |
            BASE_IMAGE=${{ steps.metadata.outputs.base_image }}
            UV_IMAGE=${{ steps.metadata.outputs.uv_image }}
            KONRAD_VERSION=${{ steps.metadata.outputs.version }}
            GIT_SHA=${{ steps.metadata.outputs.sha }}
            BUILD_DATE=${{ steps.metadata.outputs.commit_date }}
            SOURCE_DATE_EPOCH=0
          # Every input is pinned by digest via image/locks/. `pull` would
          # be a no-op (the FROM / COPY --from refs are already content-
          # addressed), so it's off. Base + uv updates flow in through the
          # GitLab resolve-locks bot, not through a daily registry re-pull.
          pull: false
          # Arch-specific cache scopes so the two matrix cells don't
          # clobber each other's GHA cache. Without these, both arches
          # would fight over the same cache and rebuild from scratch on
          # every commit.
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          # Reproducible layers. SOURCE_DATE_EPOCH=0 + rewrite-timestamp=true
          # makes BuildKit walk every file in every exported layer and
          # rewrite its mtime to 1970-01-01 before tar'ing. Result: when a
          # layer's filesystem content is logically identical to a previous
          # run (same packages installed, same files copied), the layer's
          # tar bytes are also identical → same sha256 digest → users
          # don't re-download.
          #
          # Why a fixed value (0) and not the commit timestamp: BuildKit's
          # rewrite pass runs over EVERY exported layer including cache
          # hits, not just freshly-built ones. A per-commit SDE would
          # therefore produce new layer digests on every commit even when
          # the underlying content was byte-identical — defeating the
          # whole point of the rewrite. The value 0 is chosen to be
          # obviously not a real date (file mtimes show 1970), so anyone
          # inspecting the image doesn't mistake them for the build time.
          # Actual build time still lives in /etc/konrad/build-manifest.json
          # and the OCI image labels.
          #
          # type=image,push=true is the equivalent of the bare `push: true`
          # field (which is mutually exclusive with a custom `outputs:`
          # block).
          outputs: type=image,push=true,rewrite-timestamp=true

  # ---------------------------------------------------------------------------
  # Smoke — matrix over (amd64, arm64). Each cell pulls its arch's
  # transient image and runs the smoke suite natively on a matching
  # runner. Real-environment signal per arch: if e.g. an arm64-only
  # wheel is missing or a layer's binaries refuse to execute, the
  # corresponding cell fails and publish is blocked.
  #
  # The transient tag name is reconstructed deterministically from
  # github.run_id + matrix.arch rather than threaded through matrix
  # job outputs (those are awkward in GHA — only one cell's output is
  # visible to downstream jobs).
  # ---------------------------------------------------------------------------
  smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull transient image (${{ matrix.arch }})
        run: |
          IMG=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          TRANSIENT="$IMG:ci-${{ github.run_id }}-${{ matrix.arch }}"
          echo "smoking $TRANSIENT on ${{ matrix.arch }}"
          docker pull "$TRANSIENT"
          docker tag  "$TRANSIENT" konrad:latest

      - name: Run smoke test (${{ matrix.arch }})
        env:
          CONTAINER_ENGINE: docker
        run: ./scripts/smoke-test.sh konrad:latest

  # ---------------------------------------------------------------------------
  # Publish — only runs if both arches' smoke jobs passed. `imagetools
  # create` with two source manifests produces a multi-arch manifest
  # list — a single pull against the resulting tag auto-selects amd64 or
  # arm64 to match the host architecture. The retag operation copies
  # manifest metadata only; no layer data moves.
  #
  # Tag list depends on the trigger:
  #   - push to main / workflow_dispatch on main → :<ver>-<date>, :<ver>,
  #                                                 :<minor>, :latest, :<sha>
  #                                                 (where <minor> = 0.X
  #                                                 derived from <ver>=0.X.Y)
  #   - pull_request from same repo   → :pr-<num> only (transient, replaced
  #                                      on every push to the PR branch)
  #   - pull_request from a fork      → SKIPPED (GITHUB_TOKEN is read-only
  #                                      on fork PRs; can't write to ghcr.io).
  #                                      Smoke still ran, so reviewers have
  #                                      that signal.
  #   - workflow_dispatch on non-main → SKIPPED (would otherwise clobber
  #                                      :latest with a feature-branch image;
  #                                      build + smoke still run for signal).
  # ---------------------------------------------------------------------------
  publish:
    needs: [build, smoke]
    runs-on: ubuntu-latest
    # Skip from fork PRs (no registry write access from the default token).
    # Skip workflow_dispatch from non-main refs (don't let a manual run
    # against a feature branch publish under the rolling tags).
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
      && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest list, push public tags
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          EVENT: ${{ github.event_name }}
        run: |
          IMG=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          VER=$(cat VERSION)
          DATE=$(date -u +%Y-%m-%d)
          SHA=${GITHUB_SHA::7}
          AMD64="$IMG:ci-${{ github.run_id }}-amd64"
          ARM64="$IMG:ci-${{ github.run_id }}-arm64"
          if [ "$EVENT" = "pull_request" ]; then
            TAGS="pr-$PR_NUM"
          else
            # VER is 0.X.Y pre-1.0 (X.Y.Z post-1.0). MINOR strips the
            # trailing .Y / .Z, leaving the floating tag for the patch line.
            MINOR="${VER%.*}"
            TAGS="$VER-$DATE $VER $MINOR latest $SHA"
          fi
          # imagetools create with two source manifests produces a multi-
          # arch manifest list — `podman pull` against the resulting tag
          # auto-selects amd64 or arm64 to match the host architecture.
          for TAG in $TAGS; do
            docker buildx imagetools create \
              --tag "$IMG:$TAG" \
              "$AMD64" "$ARM64"
            echo "published $IMG:$TAG (multi-arch: amd64 + arm64)"
          done

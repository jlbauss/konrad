# =============================================================================
# konrad CI — build, smoke-test, publish the container image.
#
# This workflow runs on GitHub Actions even though the primary repo lives
# on gitlab.git.nrw. The GitHub repo is a push mirror that exists only as
# a CI execution surface; code work happens on GitLab. See README's
# "Pinning strategy" section for the why.
#
# Trigger model:
#   - push to main when image/, scripts/smoke-test.sh, this file, or
#     VERSION changes  → build + smoke + publish
#   - pull_request    → build + smoke + publish under :pr-<num>
#   - workflow_dispatch (manual via Actions tab) → same as push
#
# Every floating input is now lock-managed (image/locks/{base,uv,python,
# npm,typst,models}.lock). The GitLab resolve-locks bot resolves these
# daily; when any lock moves the merge mirrors to GitHub and triggers
# a real build here via the path filter on image/**. There is no daily
# `schedule:` trigger on this workflow — a build only fires when there
# is something genuinely new to build.
#
# Smoke-gated publish: if the smoke job fails, publish never runs and
# `:latest` stays pointed at the last good build.
#
# Tag scheme (all pushed by every successful pipeline):
#   :<ver>.<date>      immutable; e.g. 0.1.2026-05-23 — the rollback handle
#   :<ver>             rolling; latest passing build on the current VERSION
#   :latest            rolling alias for the newest <ver> passing build
#   :<short-sha>       immutable; for bisecting
#
# Architecture: amd64-only today. arm64 hosted runners on GitHub Actions
# are free for public repos but paid for private ones. Re-enable arm64 in
# the build matrix when the GitHub mirror is flipped to public — see the
# ROADMAP entry.
# =============================================================================

name: Build and publish konrad image

on:
  push:
    branches: [main]
    paths:
      - 'image/**'
      - 'scripts/smoke-test.sh'
      - '.github/workflows/build-image.yml'
      - 'VERSION'
  pull_request:
    branches: [main]
    paths:
      - 'image/**'
      - 'scripts/smoke-test.sh'
      - '.github/workflows/build-image.yml'
      - 'VERSION'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository is "owner/repo" — lowercased to satisfy ghcr.io's
  # requirement that image paths be lowercase.
  IMAGE_NAME: ${{ github.repository }}
  # Force JavaScript actions to run on Node 24 instead of the deprecated
  # Node 20 runtime. checkout@v5 and build-push-action@v6 already ship
  # Node 24; setup-buildx-action@v3 and login-action@v3 still ship
  # Node 20 (no v4 yet). This env var silences their deprecation warning
  # and runs them on Node 24 too — GitHub will flip this default in
  # June 2026 anyway. Remove this line once the docker org ships Node 24
  # versions of setup-buildx and login.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Build — produces an amd64 image pushed to ghcr.io under a transient
  # tag scoped to this CI run. Smoke and publish jobs consume that tag.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      transient-tag: ${{ steps.metadata.outputs.transient }}
      konrad-version: ${{ steps.metadata.outputs.version }}
      build-date: ${{ steps.metadata.outputs.date }}
      short-sha: ${{ steps.metadata.outputs.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute build metadata
        id: metadata
        run: |
          VER=$(cat VERSION)
          DATE=$(date -u +%Y-%m-%d)
          SHA=${GITHUB_SHA::7}
          # Commit committer date in two forms:
          #   - ISO-8601 UTC → BUILD_DATE in the image's build-manifest.json
          #     so two builds from the same source commit produce a
          #     byte-identical manifest layer.
          #   - Unix epoch  → SOURCE_DATE_EPOCH, the canonical timestamp
          #     BuildKit uses when rewriting layer mtimes (see "Reproducible
          #     layers" below). Tied to the commit, not the build moment,
          #     so re-runs of CI on the same commit produce byte-identical
          #     layers.
          COMMIT_DATE=$(git log -1 --format=%cI "$GITHUB_SHA" | sed 's/+00:00/Z/' | sed 's/T\(..\):\(..\):\(..\).*/T\1:\2:\3Z/')
          COMMIT_EPOCH=$(git log -1 --format=%ct "$GITHUB_SHA")
          # IMAGE_NAME may contain uppercase from $github.repository when
          # the GitHub username/repo has any. ghcr.io rejects uppercase
          # in image paths, so lowercase it here.
          IMG=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          TRANSIENT="$IMG:ci-${{ github.run_id }}"
          # Pinned image refs (full name@digest) from the lock files. Local
          # `konrad rebuild` reads the same files, so the CI build resolves
          # to identical digests as a developer's local build.
          BASE_IMAGE=$(cat image/locks/base.lock)
          UV_IMAGE=$(cat image/locks/uv.lock)
          [ -n "$BASE_IMAGE" ] || { echo "empty image/locks/base.lock" >&2; exit 1; }
          [ -n "$UV_IMAGE" ]   || { echo "empty image/locks/uv.lock"   >&2; exit 1; }
          {
            echo "version=$VER"
            echo "date=$DATE"
            echo "sha=$SHA"
            echo "commit_date=$COMMIT_DATE"
            echo "commit_epoch=$COMMIT_EPOCH"
            echo "image=$IMG"
            echo "transient=$TRANSIENT"
            echo "base_image=$BASE_IMAGE"
            echo "uv_image=$UV_IMAGE"
          } >> "$GITHUB_OUTPUT"
          echo "konrad $VER @ $SHA (build $DATE, commit $COMMIT_DATE)"
          echo "base: $BASE_IMAGE"
          echo "uv:   $UV_IMAGE"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (transient tag)
        uses: docker/build-push-action@v6
        with:
          context: image/
          platforms: linux/amd64
          tags: ${{ steps.metadata.outputs.transient }}
          build-args: |
            BASE_IMAGE=${{ steps.metadata.outputs.base_image }}
            UV_IMAGE=${{ steps.metadata.outputs.uv_image }}
            KONRAD_VERSION=${{ steps.metadata.outputs.version }}
            GIT_SHA=${{ steps.metadata.outputs.sha }}
            BUILD_DATE=${{ steps.metadata.outputs.commit_date }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.commit_epoch }}
          # Every input is pinned by digest via image/locks/. `pull` would
          # be a no-op (the FROM / COPY --from refs are already content-
          # addressed), so it's off. Base + uv updates flow in through the
          # GitLab resolve-locks bot, not through a daily registry re-pull.
          pull: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Reproducible layers. SOURCE_DATE_EPOCH (passed above) tells
          # BuildKit the canonical timestamp; rewrite-timestamp=true makes
          # BuildKit walk every file in every produced layer and rewrite
          # its mtime to that value before tar'ing. Result: when a layer's
          # content is logically identical to a previous run (same packages
          # installed, same files copied), the layer's tar bytes are also
          # identical → same sha256 digest → users don't re-download.
          # Without this, apt and similar tools stamp current mtimes into
          # every installed file, so a rebuild with byte-identical content
          # still produces a new digest. type=image,push=true is the
          # equivalent of the bare `push: true` field (which is mutually
          # exclusive with custom `outputs`).
          outputs: type=image,push=true,rewrite-timestamp=true

  # ---------------------------------------------------------------------------
  # Smoke — pull the transient image, run the smoke suite against it.
  # Failure here blocks the publish job.
  # ---------------------------------------------------------------------------
  smoke:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull transient image
        env:
          TRANSIENT: ${{ needs.build.outputs.transient-tag }}
        run: |
          docker pull "$TRANSIENT"
          docker tag  "$TRANSIENT" konrad:latest

      - name: Run smoke test
        env:
          CONTAINER_ENGINE: docker
        run: ./scripts/smoke-test.sh konrad:latest

  # ---------------------------------------------------------------------------
  # Publish — only runs if smoke passed. `imagetools create -t newtag oldtag`
  # retags without re-pulling/re-pushing layers; copies the manifest to
  # each public tag in one fast operation per tag.
  #
  # Tag list depends on the trigger:
  #   - push to main / schedule / workflow_dispatch → :<ver>.<date>, :<ver>,
  #                                                    :latest, :<sha>
  #   - pull_request from same repo  → :pr-<num> only (transient, replaced
  #                                     on every push to the PR branch)
  #   - pull_request from a fork     → SKIPPED (GITHUB_TOKEN is read-only
  #                                     on fork PRs; can't write to ghcr.io).
  #                                     Smoke still ran in the smoke job, so
  #                                     reviewers have that signal.
  # ---------------------------------------------------------------------------
  publish:
    needs: [build, smoke]
    runs-on: ubuntu-latest
    # Skip from fork PRs (no registry write access from the default token).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag transient → public tags
        env:
          TRANSIENT: ${{ needs.build.outputs.transient-tag }}
          VER: ${{ needs.build.outputs.konrad-version }}
          DATE: ${{ needs.build.outputs.build-date }}
          SHA: ${{ needs.build.outputs.short-sha }}
          IMG: ${{ needs.build.outputs.transient-tag }}
          PR_NUM: ${{ github.event.pull_request.number }}
          EVENT: ${{ github.event_name }}
        run: |
          # Strip the :ci-${run_id} suffix to get the registry path
          BASE="${IMG%:*}"
          if [ "$EVENT" = "pull_request" ]; then
            TAGS="pr-$PR_NUM"
          else
            TAGS="$VER.$DATE $VER latest $SHA"
          fi
          for TAG in $TAGS; do
            docker buildx imagetools create \
              --tag "$BASE:$TAG" \
              "$TRANSIENT"
            echo "published $BASE:$TAG"
          done

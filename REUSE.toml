# REUSE configuration — https://reuse.software (spec 3.x).
#
# Declares copyright + license for every file by glob, so the repo is SPDX-clear
# and machine-readable without a per-file header on each source file. Full
# license texts live in LICENSES/.
#
# Verified: `reuse lint` reports the project compliant with spec 3.3 (124/124
# files have copyright + license info). The `**` catch-all below coexists with
# the per-directory overrides — REUSE resolves the most specific match.
#
# Follow-up (tracked in ROADMAP, doesn't block compliance): LICENSES/OFL-1.1.txt
# carries Inter's copyright header; the canonical SPDX template
# (`reuse download OFL-1.1`) would be cleaner.

version = 1

# ── konrad's own code and docs ────────────────────────────────────────────────
[[annotations]]
path = "**"
SPDX-FileCopyrightText = "2026 Jan-Luca Bauß"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# ── Bundled fonts — SIL Open Font License 1.1 (one copyright per family) ──────
[[annotations]]
path = "image/fonts/konrad/Inter/**"
SPDX-FileCopyrightText = "2016 The Inter Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "image/fonts/konrad/SourceSerif4/**"
SPDX-FileCopyrightText = "2014-2023 Adobe (Reserved Font Name 'Source')"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "image/fonts/konrad/Fraunces/**"
SPDX-FileCopyrightText = "2018 The Fraunces Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "image/fonts/konrad/JetBrainsMono/**"
SPDX-FileCopyrightText = "2020 The JetBrains Mono Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "image/fonts/konrad/EBGaramond/**"
SPDX-FileCopyrightText = "2017 The EB Garamond Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "image/fonts/konrad/IBMPlexSans/**"
SPDX-FileCopyrightText = "2017 IBM Corp. (Reserved Font Name 'Plex')"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "image/fonts/konrad/AtkinsonHyperlegible/**"
SPDX-FileCopyrightText = "2020 Braille Institute of America, Inc."
SPDX-License-Identifier = "OFL-1.1"

# ── Vendored skills — kept under their upstream license ───────────────────────
[[annotations]]
path = "image/opencode/skills/spreadsheets/**"
SPDX-FileCopyrightText = "MiniMax AI"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "image/opencode/skills/image-editing/**"
SPDX-FileCopyrightText = "jlouage"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ["image/opencode/skills/grill-me/**", "image/opencode/skills/write-a-skill/**"]
SPDX-FileCopyrightText = "2026 Matt Pocock"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "image/opencode/skills/frontend-design/**"
SPDX-FileCopyrightText = "Anthropic"
SPDX-License-Identifier = "Apache-2.0"

# ── pdf skill — partially vendored (the rest is konrad's own via the catch-all) ─
# FILL route — forms.md is MIT © MiniMax AI (the fill_*.py scripts carry their own headers):
[[annotations]]
path = "image/opencode/skills/pdf/forms.md"
SPDX-FileCopyrightText = "MiniMax AI"
SPDX-License-Identifier = "MIT"

# EXTRACT route — inherits MIT © docling-project:
[[annotations]]
path = "image/opencode/skills/pdf/extract.md"
SPDX-FileCopyrightText = "docling-project"
SPDX-License-Identifier = "MIT"
